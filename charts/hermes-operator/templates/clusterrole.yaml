{{- if .Values.createRBAC }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "hermes-operator.fullname" . }}
  labels: {{- include "hermes-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [configmaps, persistentvolumeclaims, services]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [apps]
    resources: [statefulsets]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [hermes.agent]
    resources: [hermesinstances]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [hermes.agent]
    resources: [hermesinstances/finalizers]
    verbs: [update]
  - apiGroups: [hermes.agent]
    resources: [hermesinstances/status]
    verbs: [get, patch, update]
{{- end }}
