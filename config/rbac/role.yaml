---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - hermes.agent
  resources:
  - hermesinstances
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - hermes.agent
  resources:
  - hermesinstances/finalizers
  verbs:
  - update
- apiGroups:
  - hermes.agent
  resources:
  - hermesinstances/status
  verbs:
  - get
  - patch
  - update
