apiVersion: hermes.agent/v1
kind: HermesInstance
metadata:
  name: conformance-networking
spec:
  image:
    repository: ghcr.io/paperclipinc/hermes-agent
    tag: latest
  storage:
    persistence:
      enabled: true
      size: 1Gi
  networking:
    ingress:
      enabled: true
      host: hermes.example.com
      className: nginx
      pathType: Prefix
      path: /
      servicePortName: gateway
